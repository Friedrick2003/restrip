services:
  - type: web
    name: restrip-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false       # set manually in Render dashboard
      - key: JWT_ACCESS_SECRET
        generateValue: false  # set manually
      - key: JWT_REFRESH_SECRET
        generateValue: false  # set manually
      - key: JWT_ACCESS_EXPIRES
        value: 15m
      - key: JWT_REFRESH_EXPIRES
        value: 7d
      - key: CLIENT_URL
        sync: false       # your Vercel/Netlify URL
